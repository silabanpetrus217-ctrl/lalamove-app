<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Lalamove</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="page show center">
    <img src="logo.jpeg" class="logo">
    <button id="btnMasuk">Masuk</button>
</div>

<!-- HOME -->
<div id="home" class="page hidden app">
    <div class="header">
        <span>Rincian</span>
        <span class="tarif" id="btnTarif">Tarif</span> <!-- 🔥 JADI BUTTON -->
    </div>

    <div class="content">
        <div class="section">
            <div class="row"><span>Tunai</span><span id="tunai">Rp0</span></div>
        </div>

        <div class="section">
            <div class="row small"><span>Pengiriman</span><span id="pengirimanText">Rp0</span></div>
            <div class="row small"><span>Prioritas</span><span id="prioritasText">Rp0</span></div>
            <div class="row small"><span>PPN</span><span id="ppnText">Rp0</span></div>
        </div>

        <div class="section">
            <div class="row small"><span>Komisi</span><span id="komisiText">-Rp0</span></div>
        </div>
    </div>

    <div class="bottom">
        <span>Pendapatan</span>
        <span id="total">Rp0</span>
    </div>
</div>

<!-- TAMBAH DATA -->
<div id="tambah" class="page hidden container">
    <h3>Tambah Pengeluaran</h3>

    <input type="text" id="pengiriman" class="rupiah" placeholder="Pengiriman">
    <input type="text" id="prioritas" class="rupiah" placeholder="Prioritas">
    <input type="text" id="ppn" class="rupiah" placeholder="PPN">
    <input type="text" id="komisi" class="rupiah" placeholder="Komisi">

    <button id="btnSimpan">Simpan</button>
    <button id="btnKembali">Kembali</button>
</div>

<script src="script.js"></script>
</body>
</html>
